<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!--#include:meta-->
<!--#include:head-->
</head>
<body>

<!--#include:nav-->

<!-- ───────── PAGE HERO ───────── -->
<section class="page-hero">
  <div class="container">
    <div class="section-label" data-i18n="contact-hero-label">Contact</div>
    <h1 data-i18n="contact-hero-title">무엇이든<br /><span class="highlight">물어보세요</span></h1>
    <p class="page-hero-sub" data-i18n="contact-hero-sub">제휴, 도입 문의, 또는 그냥 궁금한 것 무엇이든 환영합니다.</p>
  </div>
</section>

<!-- ───────── FORM ───────── -->
<section class="section">
  <div class="container contact-layout">

    <form class="contact-form" id="contactForm" onsubmit="handleSubmit(event)">
      <div class="form-group">
        <label for="name"><span data-i18n="form-name-label">이름</span> <span class="required">*</span></label>
        <input type="text" id="name" name="name" data-i18n-ph="form-name-ph" placeholder="홍길동" required />
      </div>

      <div class="form-group">
        <label for="org"><span data-i18n="form-org-label">기관명</span></label>
        <input type="text" id="org" name="org" data-i18n-ph="form-org-ph" placeholder="OO초등학교 (선택)" />
      </div>

      <div class="form-group">
        <label for="email"><span data-i18n="form-email-label">이메일</span> <span class="required">*</span></label>
        <input type="email" id="email" name="email" placeholder="hello@example.com" required />
      </div>

      <div class="form-group">
        <label for="type" data-i18n="form-type-label">문의 유형</label>
        <select id="type" name="type">
          <option value="" data-i18n="opt-select">선택해주세요</option>
          <option value="personal" data-i18n="opt-personal">개인</option>
          <option value="academy" data-i18n="opt-academy">학교 · 기관</option>
          <option value="partnership" data-i18n="opt-partner">제휴 · 미디어</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message" data-i18n="form-msg-label">내용</label>
        <textarea id="message" name="message" rows="6" data-i18n-ph="form-msg-ph" placeholder="문의 내용을 자유롭게 작성해주세요."></textarea>
      </div>

      <button type="submit" class="btn-primary btn-full" data-i18n="form-submit">보내기 →</button>
      <div id="formStatus" class="form-status" hidden></div>
    </form>

    <aside class="contact-info">
      <div class="contact-info-card">
        <h3 data-i18n="info1-title">직접 연락하기</h3>
        <p data-i18n="info1-desc">양식 대신 직접 이메일로 연락해도 됩니다.</p>
        <a href="mailto:code-builder@haedal.io" class="contact-email">code-builder@haedal.io</a>
      </div>
      <div class="contact-info-card">
        <h3 data-i18n="info2-title">게임 바로가기</h3>
        <p data-i18n="info2-desc">지금 바로 로블록스에서 Code Builder를 체험해보세요.</p>
        <a href="https://www.roblox.com/join/1i9yw" target="_blank" class="btn-primary" style="margin-top:0.75rem;display:inline-block;" data-i18n="info2-play">▶ 플레이하기</a>
      </div>
    </aside>

  </div>
</section>

<!--#include:footer-->
</body>
</html>
